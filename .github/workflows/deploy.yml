name: Deploy Weather App to GitHub Pages

on:
  push:
    branches:
      - main # Change this to your default branch (e.g., master)
    paths:
      - '.github/**'
      - 'weather-app/**' # Only trigger if files in this package change

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Use your project's Node version
          cache: 'npm'     # Or yarn / pnpm
          cache-dependency-path: 'weather-app/package-lock.json'

      - name: Install Dependencies
        run: npm ci        # Installs all dependencies

      - name: Build Specific Package
        run: npm run build --workspace=weather-app 

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: weather-app/dist # The folder where your build output lives
          branch: weather-gh-pages                    # The branch the action will deploy to

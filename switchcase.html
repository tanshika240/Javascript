<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch case</title>
</head>
<body>
    <script>
        let day=3;
        switch(day){
            case 1:
                document.write("Today is monday");
                break;
                case 2:
                    document.write("Tomorrow is tuesday");
                    break;
                case 3:
                    document.write("Day after tomorrow is wednesday");
                    break;
                default:
                    document.write("Invalid day");
                    break;        
        }
    </script>
</body>
</html>
